services:
  - type: web
    name: safeconnect-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safeconnect-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: CORS_ALLOW_ORIGINS
        value: "https://safeconnect-frontend.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.9"

  - type: web
    name: safeconnect-frontend
    runtime: static
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /
        destination: /index.html

databases:
  - name: safeconnect-db
    plan: free
